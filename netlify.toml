[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ─── Security headers (applied to all routes) ───────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://unpkg.com https://www.youtube.com https://www.youtube-nocookie.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https://img.youtube.com https://i.ytimg.com https://images.unsplash.com;
      media-src 'self' blob: https://dl.dropboxusercontent.com;
      frame-src https://www.google.com https://www.youtube.com https://www.youtube-nocookie.com;
      connect-src 'self' https://lichess.org https://api.telegram.org;
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests;
    """

# ─── Cache static assets ─────────────────────────────────────────────────────

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─── RSS & sitemap: no caching so updates propagate immediately ──────────────

[[headers]]
  for = "/rss.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/rss+xml; charset=utf-8"

[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
